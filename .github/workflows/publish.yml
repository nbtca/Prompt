name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - name: Check tag matches package version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Version mismatch: tag v$TAG_VERSION, package.json v$PKG_VERSION" >&2
            exit 1
          fi

      # OIDC trusted publishing: no stored token. Requires npm >= 11.5.1 and a
      # trusted publisher configured on npmjs for @nbtca/prompt (publish.yml).
      # --provenance engages the OIDC id-token for both auth and provenance.
      - name: Publish
        run: |
          npm install -g npm@latest
          # setup-node writes a dummy _authToken into this .npmrc; remove it so
          # npm uses the OIDC-exchanged credential (not the fake token) for the
          # registry write. --provenance forces npm to engage OIDC.
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          npm publish --access public --provenance
