name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 🛎️ Checkout code
        uses: actions/checkout@v4

      # NOTE: no `registry-url` — setup-node would write a dummy _authToken
      # placeholder into .npmrc, which npm would try (and fail with E404),
      # preventing OIDC trusted publishing. The default registry is npmjs.
      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: ⬆️ Upgrade npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build TypeScript
        run: npm run build

      - name: ✅ Verify build
        run: |
          test -d dist || (echo "dist directory not found" && exit 1)
          test -f dist/index.js || (echo "dist/index.js not found" && exit 1)
          echo "Build artifacts verified"

      - name: 📋 Check package version
        id: version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Version mismatch! Tag: v$TAG_VERSION, package.json: v$PKG_VERSION"
            exit 1
          fi
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

      # Auth via OIDC trusted publishing — no NPM_TOKEN, no stored secret.
      # Provenance is generated automatically. Requires a trusted publisher
      # configured on npmjs.com for @nbtca/prompt (workflow: publish.yml).
      - name: 🚀 Publish to npm (OIDC trusted publishing)
        run: npm publish --access public

      - name: ✅ Success notification
        run: |
          echo "🎉 Successfully published @nbtca/prompt@${{ steps.version.outputs.version }} to npm"
