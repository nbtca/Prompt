name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 🛎️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build TypeScript
        run: npm run build

      - name: ✅ Verify build
        run: |
          test -d dist || (echo "dist directory not found" && exit 1)
          test -f dist/index.js || (echo "dist/index.js not found" && exit 1)
          echo "Build artifacts verified"

      - name: 📋 Check package version
        id: version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Version mismatch! Tag: v$TAG_VERSION, package.json: v$PKG_VERSION"
            exit 1
          fi
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

      # Auth via OIDC trusted publishing — no NPM_TOKEN, no stored secret.
      # npm >= 11.5.1 is required; upgrade and publish in the SAME step so the
      # freshly installed npm is the one that runs publish. Provenance is
      # automatic. Requires a trusted publisher configured on npmjs.com for
      # @nbtca/prompt (workflow: publish.yml).
      - name: 🚀 Publish to npm (OIDC trusted publishing)
        run: |
          npm install -g npm@latest
          echo "Using npm $(npm --version)"
          # setup-node injects a placeholder _authToken into this .npmrc; remove
          # it so npm >= 11.5.1 uses OIDC trusted publishing instead of the fake
          # token (otherwise the registry rejects the publish as E404).
          sed -i '/:_authToken=/d' "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}" || true
          npm publish --access public

      - name: ✅ Success notification
        run: |
          echo "🎉 Successfully published @nbtca/prompt@${{ steps.version.outputs.version }} to npm"
